services:
  - type: web
    name: ane-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: FALLBACK_API_KEY
        sync: false
      - key: FALLBACK_BASE_URL
        value: https://api.openai.com/v1
      - key: FALLBACK_MODEL
        value: gpt-4o-mini
      - key: ZEP_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: DEFAULT_AGENT_COUNT
        value: "20"
      - key: MAX_AGENT_COUNT
        value: "100"
